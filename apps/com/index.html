<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/logos/logo_icon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <title>Team Magnificent</title>

    <!--
      OpenGraph metadata per locked-spec Part 4.6.
      Default tags below are static fallbacks for the root URL and any
      non-/p route. The Chat #107 og-injection middleware overwrites
      everything between the tm:og:start / tm:og:end markers on /p/:token
      with token-resolved values (prospect name + BA name).
      No THREE branding (brand isolation, locked-spec Part 3.8).
    -->
    <!-- tm:og:start -->
    <meta property="og:url" content="https://teammagnificent.com" />
    <meta property="og:title" content="ALL THINGS GLP-THREE" />
    <meta property="og:description" content="Dr. Dan Gubler explains the science behind GLP-THREE." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://teammagnificent.com/og/all-things-glp-three.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <!-- tm:og:end -->
  </head>
  <body class="bg-ink text-cream font-body antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
