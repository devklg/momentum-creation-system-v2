name: CI Merge Gates

# Enforces the Sprint 1 verification gates (typecheck + build + server tests)
# on every pull request targeting main and on every push to main.
# The single job below is named "gates" so the check run it publishes matches
# the branch-protection Required status check context "gates" exactly. To make
# it blocking on merge, enable branch protection on `main` and mark the "gates"
# check as Required (repo setting, owner action).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package for downstream typecheck
        run: pnpm build:shared

      # Generated catalogs are validated from the merged source tree but are
      # not committed by feature branches. The post-merge job below refreshes
      # their tracked snapshots once the real gates are green. This removes the
      # shared-artifact merge race between parallel source PRs.
      - name: Generate and validate derived catalogs ephemerally
        run: pnpm catalog:generate:all

      - name: Validate generated output formatting
        run: git diff --check

      - name: Typecheck (merge gate)
        run: pnpm typecheck

      - name: Build (merge gate)
        run: pnpm build

      - name: Server tests
        # The deterministic handle-manifest gate (handleManifest.test.ts) always
        # runs here. The LIVE retrieval regression is local-only BY DESIGN —
        # Kevin's library must never be reachable from GitHub runners. It runs
        # only with RETRIEVAL_REGRESSION=live (`pnpm memory:verify` locally);
        # unset here, so it skips loudly and visibly.
        run: pnpm --filter @momentum/server test
        env:
          RETRIEVAL_REGRESSION: skip

  refresh-generated-catalogs:
    name: refresh-generated-catalogs
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: gates
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
    steps:
      - name: Checkout merged main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package for generators
        run: pnpm build:shared

      - name: Regenerate catalogs from merged source
        run: pnpm catalog:generate:all

      - name: Open protected catalog refresh pull request when changed
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet; then
            echo "Generated catalogs are already current."
            exit 0
          fi
          refresh_branch="automation/catalog-refresh-${GITHUB_SHA::12}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$refresh_branch"
          git add -u
          git commit -m "chore: refresh generated catalogs after merge"
          git push origin "$refresh_branch"
          pr_url=$(gh pr create \
            --base main \
            --head "$refresh_branch" \
            --title "chore: refresh generated catalogs after merge" \
            --body "Automated catalog refresh generated from merged source at ${GITHUB_SHA}. This PR contains tracked derived artifacts only.")
          gh pr merge "$pr_url" --auto --merge --delete-branch
          gh workflow run ci.yml --ref "$refresh_branch"
