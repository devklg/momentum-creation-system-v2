name: CI Merge Gates

# Enforces the Sprint 1 verification gates (typecheck + build + server tests)
# on every pull request targeting main and on every push to main.
# The single job below is named "gates" so the check run it publishes matches
# the branch-protection Required status check context "gates" exactly. To make
# it blocking on merge, enable branch protection on `main` and mark the "gates"
# check as Required (repo setting, owner action).

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: gates
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package for downstream typecheck
        run: pnpm build:shared

      - name: Persistence write catalog check
        run: pnpm catalog:persistence:check

      - name: API route map check
        run: pnpm catalog:api-routes:check

      - name: Route access matrix check
        run: pnpm catalog:route-access:check

      - name: COM prospect compliance scan check
        run: pnpm compliance:com:check

      - name: Typecheck (merge gate)
        run: pnpm typecheck

      - name: Build (merge gate)
        run: pnpm build

      - name: Server tests
        # The deterministic handle-manifest gate (handleManifest.test.ts) always
        # runs here. The LIVE retrieval regression is local-only BY DESIGN —
        # Kevin's library must never be reachable from GitHub runners. It runs
        # only with RETRIEVAL_REGRESSION=live (`pnpm memory:verify` locally);
        # unset here, so it skips loudly and visibly.
        run: pnpm --filter @momentum/server test
        env:
          RETRIEVAL_REGRESSION: skip
